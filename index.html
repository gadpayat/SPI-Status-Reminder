<!DOCTYPE html> 
<html>
<head>
  <title>Reminder Prompt</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:transparent;
      overflow:hidden;
    }

    /* Slide down */
    @keyframes slideDown{
      from{transform:translateY(-120px);opacity:0;}
      to{transform:translateY(0);opacity:1;}
    }

    /* Blinking */
    @keyframes blink{
      0%{opacity:1;}
      50%{opacity:0.4;}
      100%{opacity:1;}
    }

    /* Train movement */
    @keyframes trainMove{
      0%{transform:translateX(0%);}
      100%{transform:translateX(-100%);}
    }

    /* Container */
    #container{
      width:100%;
    }

    /* Banner */
    #reminderBanner{
      width:100%;
      background:linear-gradient(to right,#ff8800,#ff0055);
      color:white;
      padding:18px 0;
      font-size:28px;
      font-weight:bold;
      text-align:center;

      animation: slideDown 1s ease, blink 1.2s infinite;
      overflow:hidden;
      white-space:nowrap;
    }

    /* Moving text */
    #movingText{
      display:inline-block;
      animation: trainMove 6s linear infinite;
      white-space:nowrap;
      padding-left:0%;
    }

  </style>
</head>

<body>

<div id="container">

  <div id="reminderBanner">
    <div id="movingText">
      ⏰ REMINDER: Updating of the Sub-Project Implementation Status (SPI) is every Thursday until 11:59 PM.
      Including reviewing progress, checking for issues or delays, and ensuring all sub-project statuses are current and accurate.
    </div>
  </div>

</div>

<script>
window.onload = () => {
  // Optional alert (still stays)
  alert("⏰ Reminder Activated!");
};
</script>

</body>
</html>
</script>

</body>
</html>
